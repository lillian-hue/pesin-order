<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佩森肉舖 出貨管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1A0A00;
  --brown: #5C2D0A;
  --gold: #C8962E;
  --cream: #FAF5EC;
  --cream-dark: #F0E8D8;
  --border: #D4B896;
  --gray: #8A7A6A;
  --green: #1A5C2A;
  --light-green: #E8F5EE;
  --red: #8B1A1A;
  --light-red: #FDF0F0;
  --blue: #1A3A6B;
  --light-blue: #EEF3FA;
  --orange: #C86420;
  --light-orange: #FDF5E8;
  --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #F0E8D8; min-height: 100vh; color: var(--dark); }

/* HEADER */
.header {
  background: linear-gradient(135deg, #1A0A00 0%, #3E1800 50%, #1A0A00 100%);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 100;
}
.brand-name { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
.brand-sub { font-size: 10px; color: rgba(200,150,46,0.6); letter-spacing: 2px; }
.header-right { display: flex; gap: 10px; align-items: center; }
.header-badge { background: rgba(200,150,46,0.15); border: 1px solid var(--gold); border-radius: 4px; padding: 4px 12px; font-size: 11px; color: var(--gold); }

/* TABS */
.tabs { background: var(--dark); display: flex; gap: 0; border-bottom: 1px solid var(--gold); }
.tab { padding: 10px 20px; font-size: 13px; color: rgba(200,150,46,0.5); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:hover { color: var(--gold); }

/* CONTENT */
.content { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* STATUS FILTERS */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 12px; cursor: pointer; transition: all .15s; color: var(--dark); }
.filter-btn.active { background: var(--brown); color: white; border-color: var(--brown); }
.filter-btn .count { display: inline-block; background: rgba(255,255,255,0.3); border-radius: 10px; padding: 0 6px; margin-left: 4px; font-size: 10px; }
.filter-btn:not(.active) .count { background: var(--cream-dark); }

/* ORDER CARDS */
.orders-grid { display: grid; gap: 12px; }
.order-card {
  background: white; border-radius: 10px; padding: 16px 20px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all .2s; display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px; align-items: center;
}
.order-card:hover { border-color: var(--brown); box-shadow: 0 2px 12px rgba(92,45,10,0.1); }
.order-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.order-main .order-no { font-size: 13px; font-weight: 600; color: var(--brown); font-family: 'Noto Serif TC', serif; }
.order-main .order-client { font-size: 12px; color: var(--dark); margin-top: 2px; }
.order-main .order-date { font-size: 11px; color: var(--gray); margin-top: 2px; }
.order-total { font-size: 14px; font-weight: 600; color: var(--dark); text-align: right; }
.order-total .order-items { font-size: 11px; color: var(--gray); }
.status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.s-pending { background: var(--light-orange); color: var(--orange); }
.s-confirmed { background: var(--light-blue); color: var(--blue); }
.s-shipped { background: var(--light-green); color: var(--green); }
.s-invoiced { background: #F0E8F5; color: #6A1A8B; }
.s-paid { background: var(--light-green); color: var(--green); }

/* DETAIL PANEL */
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.detail-overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }
.detail-panel {
  background: var(--cream); width: 580px; max-width: 100vw;
  height: 100vh; overflow-y: auto;
  box-shadow: -4px 0 24px rgba(0,0,0,0.2);
  display: flex; flex-direction: column;
}
.detail-header {
  background: var(--dark); padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 10;
}
.detail-title { font-family: 'Noto Serif TC', serif; font-size: 16px; color: var(--gold); }
.close-btn { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; padding: 4px; }
.detail-body { padding: 20px; flex: 1; }

/* META INFO */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.meta-item label { font-size: 10px; color: var(--gray); display: block; margin-bottom: 2px; }
.meta-item .val { font-size: 13px; font-weight: 500; color: var(--dark); }

/* ITEMS TABLE */
.items-section { margin-bottom: 16px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--brown); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.item-row {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 8px;
}
.item-row.raw { border-color: var(--gold); background: #FFFBF2; }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.item-name { font-size: 13px; font-weight: 500; color: var(--dark); }
.item-spec { font-size: 11px; color: var(--gray); margin-top: 2px; }
.item-price { font-size: 12px; color: var(--brown); text-align: right; }
.item-subtotal { font-size: 13px; font-weight: 600; color: var(--dark); }

/* RAW WEIGHT INPUT */
.raw-input-area { background: var(--cream-dark); border-radius: 6px; padding: 10px 12px; margin-top: 8px; }
.raw-input-area label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 4px; }
.raw-input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.raw-input-row input { width: 80px; padding: 6px 8px; font-size: 13px; border: 1px solid var(--border); border-radius: 4px; }
.raw-calc { font-size: 12px; color: var(--brown); font-weight: 500; }
.raw-mode-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--light-orange); color: var(--orange); }

/* TOTALS */
.totals-box { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
.total-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--gray); }
.total-row.final { font-size: 16px; font-weight: 700; color: var(--brown); padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; font-family: 'Noto Serif TC', serif; }

/* ACTION BUTTONS */
.action-bar { display: flex; flex-direction: column; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--cream); position: sticky; bottom: 0; }
.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-family: 'Noto Serif TC', serif; letter-spacing: 1px; transition: all .2s; }
.btn-primary { background: var(--brown); color: white; }
.btn-primary:hover { background: var(--dark); }
.btn-secondary { background: white; color: var(--brown); border: 1.5px solid var(--brown); }
.btn-secondary:hover { background: var(--brown); color: white; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #0F3A1A; }
.btn-disabled { background: var(--cream-dark); color: var(--gray); cursor: not-allowed; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* LOADING */
.loading { text-align: center; padding: 40px; color: var(--gray); font-size: 13px; }

/* REMARK BOX */
.remark-box { background: #FDF5E8; border-left: 3px solid var(--gold); padding: 8px 12px; font-size: 12px; border-radius: 0 4px 4px 0; margin-bottom: 12px; }

/* STATUS CHANGE */
.status-select { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: white; font-family: 'Noto Sans TC', sans-serif; }

@media(max-width: 768px) {
  .order-card { grid-template-columns: auto 1fr auto; gap: 8px; }
  .detail-panel { width: 100vw; }
  .meta-grid { grid-template-columns: 1fr; }
  .content { padding: 12px; }
  .tabs { overflow-x: auto; }
  .tab { white-space: nowrap; padding: 10px 14px; font-size: 12px; }
  .raw-input-row { flex-wrap: wrap; }
}

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; display: none; }
.toast.show { display: block; animation: fadeInOut 2.5s forwards; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="brand-name">佩森肉舖</div>
    <div class="brand-sub">PESIN PREMIUM MEATS</div>
  </div>
  <div class="header-right">
    <div class="header-badge">出貨管理系統</div>
    <button onclick="loadOrders()" style="background:rgba(200,150,46,0.15);border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer">🔄 重新整理</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('all',this)">全部訂單</div>
  <div class="tab" onclick="setTab('待出貨',this)">待出貨</div>
  <div class="tab" onclick="setTab('待客確認',this)">待客確認</div>
  <div class="tab" onclick="setTab('已出貨',this)">已出貨</div>
  <div class="tab" onclick="setTab('已請款',this)">已請款</div>
  <div class="tab" onclick="setTab('已付款',this)">已付款</div>
</div>

<div class="content">
  <div id="orders-container" class="loading">載入訂單中...</div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="detail-title" id="detail-title">訂單詳情</div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body">載入中...</div>
    <div class="action-bar" id="action-bar"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbykqn6za8c_sXR8plVZ-IrpAQKE_Py-s-bDxivkAZcKm20pLNpXlSLdVEjFILEfCoo8tg/exec';

let allOrders = [];
let currentTab = 'all';
let currentOrder = null;
let currentItems = [];

const STATUS_CONFIG = {
  '待出貨':    { color: '#C86420', bg: '#FDF5E8', dot: '#C86420' },
  '待客確認':  { color: '#1A3A6B', bg: '#EEF3FA', dot: '#1A3A6B' },
  '已出貨':    { color: '#1A5C2A', bg: '#E8F5EE', dot: '#1A5C2A' },
  '已請款':    { color: '#6A1A8B', bg: '#F0E8F5', dot: '#6A1A8B' },
  '已付款':    { color: '#1A5C2A', bg: '#E8F5EE', dot: '#2E8B57' },
  '待結帳':    { color: '#C86420', bg: '#FDF5E8', dot: '#C86420' },
};

function getStatusCfg(s) {
  return STATUS_CONFIG[s] || { color: '#888', bg: '#F5F5F5', dot: '#888' };
}

// ── LOAD ORDERS ──
async function loadOrders() {
  document.getElementById('orders-container').innerHTML = `
    <div class="loading">
      <div style="margin-bottom:8px">載入訂單中...</div>
      <div style="font-size:11px;color:var(--gray)">首次載入約需 5-10 秒，請稍候</div>
      <div style="margin-top:12px;width:200px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0">
        <div id="progress-bar" style="height:4px;background:var(--brown);border-radius:2px;width:0%;transition:width 0.5s"></div>
      </div>
    </div>`;
  
  // Fake progress animation
  let prog = 0;
  const progInterval = setInterval(() => {
    prog = Math.min(prog + Math.random() * 15, 90);
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = prog + '%';
  }, 500);

  try {
    const res = await fetch(`${API}?action=orders`);
    clearInterval(progInterval);
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = '100%';
    
    const data = await res.json();
    allOrders = Array.isArray(data) ? data.reverse() : [];
    setTimeout(renderOrders, 200);
  } catch(e) {
    clearInterval(progInterval);
    document.getElementById('orders-container').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>載入失敗，請檢查網路後重試</p>
        <button onclick="loadOrders()" style="margin-top:12px;padding:8px 16px;background:var(--brown);color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px">重新載入</button>
      </div>`;
  }
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentTab === 'all' ? allOrders : allOrders.filter(o => o['付款狀態'] === currentTab);
  const container = document.getElementById('orders-container');

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>沒有${currentTab === 'all' ? '' : currentTab + '的'}訂單</p></div>`;
    return;
  }

  container.innerHTML = `
    <div style="font-size:12px;color:var(--gray);margin-bottom:12px">共 ${filtered.length} 筆訂單</div>
    <div class="orders-grid">
      ${filtered.map(o => {
        const cfg = getStatusCfg(o['付款狀態']);
        const date = o['出貨日期'] ? new Date(o['出貨日期']).toLocaleDateString('zh-TW') : '—';
        const total = o['總金額'] ? `NT$${Number(o['總金額']).toLocaleString()}` : '待確認';
        return `
          <div class="order-card" onclick="openDetail('${o['訂單編號']}')">
            <div class="order-status-dot" style="background:${cfg.dot}"></div>
            <div class="order-main">
              <div class="order-no">${o['訂單編號'] || '—'}</div>
              <div class="order-client">${o['公司名稱'] || '—'} ${o['聯絡人'] ? '・' + o['聯絡人'] : ''}</div>
              <div class="order-date">出貨日：${date}　業務：${o['負責業務'] || '—'}</div>
            </div>
            <div class="order-total">
              <div style="font-size:14px;font-weight:600">${total}</div>
              <div class="status-badge" style="background:${cfg.bg};color:${cfg.color};margin-top:4px;display:inline-block">${o['付款狀態'] || '未設定'}</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ── OPEN DETAIL ──
async function openDetail(orderNo) {
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-title').textContent = orderNo;
  document.getElementById('detail-body').innerHTML = '<div class="loading">載入明細中...</div>';
  document.getElementById('action-bar').innerHTML = '';

  currentOrder = allOrders.find(o => o['訂單編號'] === orderNo);
  
  try {
    const res = await fetch(`${API}?action=orderDetail&orderNo=${encodeURIComponent(orderNo)}`);
    const text = await res.text();
    try {
      currentItems = JSON.parse(text);
    } catch(parseErr) {
      console.error('JSON parse error:', parseErr, 'Raw:', text.substring(0, 200));
      currentItems = [];
    }
    renderDetail();
  } catch(e) {
    console.error('Fetch error:', e);
    document.getElementById('detail-body').innerHTML = '<div class="empty-state"><p>載入失敗：' + e.message + '</p></div>';
  }
}

function renderDetail() {
  const o = currentOrder;
  if (!o) return;

  const date = o['出貨日期'] ? new Date(o['出貨日期']).toLocaleDateString('zh-TW') : '—';
  const cfg = getStatusCfg(o['付款狀態']);

  // 計算目前總金額
  let calculatedTotal = calculateTotal();

  let html = '';

  // Meta info
  html += `<div class="meta-grid">
    <div class="meta-item"><label>公司名稱</label><div class="val">${o['公司名稱'] || '—'}</div></div>
    <div class="meta-item"><label>聯絡人</label><div class="val">${o['聯絡人'] || '—'}</div></div>
    <div class="meta-item"><label>出貨日期</label><div class="val">${date}</div></div>
    <div class="meta-item"><label>付款方式</label><div class="val">${o['付款方式'] || '—'}</div></div>
    <div class="meta-item"><label>負責業務</label><div class="val">${o['負責業務'] || '—'}</div></div>
    <div class="meta-item"><label>訂單狀態</label><div class="val"><span class="status-badge" style="background:${cfg.bg};color:${cfg.color}">${o['付款狀態'] || '—'}</span></div></div>
  </div>`;

  if (o['備註']) html += `<div class="remark-box">📝 備註：${o['備註']}</div>`;

  // Items
  html += `<div class="items-section"><div class="section-label">訂購品項</div>`;

  if (!currentItems.length) {
    html += '<div style="color:var(--gray);font-size:12px;text-align:center;padding:20px">尚無品項資料</div>';
  } else {
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    currentItems.forEach(function(item, idx) {
      const isRaw = item['類型'] === 'raw';
      const isSample = item['類型'] === 'sample';
      const isPc = item['數量／單位'] && item['數量／單位'].includes('顆');
      const unitPrice = Number(item['單價'] || 0);
      const origQty = item['數量／單位'] || '';
      const origSubtotal = item['小計'] ? Number(item['小計']) : 0;
      const sampleTag = '<span style="font-size:10px;background:#FDF0E0;color:var(--gold);border:1px solid var(--gold);border-radius:3px;padding:1px 5px;margin-left:4px">樣品</span>';
      const priceStr = isSample ? '贈品' : 'NT$' + unitPrice.toLocaleString() + (isRaw ? '/kg' : '/包');
      const hasCutInfo = isRaw && origQty && origQty.includes('代切');
      const cutInfoHtml = hasCutInfo ? '<div style="font-size:10px;color:var(--orange);margin-top:3px">✂️ ' + (origQty.match(/代切[^）]*）?/) || [''])[0] + '</div>' : '';

      let bodyHtml = '';

      if (isSample) {
        bodyHtml = '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-top:6px"><span>數量：' + origQty + '</span><span>贈品</span></div>';
      } else if (isRaw) {
        let inputsHtml = '';
        if (isPc) {
          const pcCount = parseInt(origQty) || 1;
          for (let i = 0; i < pcCount; i++) {
            inputsHtml += '<div style="display:flex;align-items:center;gap:4px"><span style="font-size:11px;color:var(--gray)">第' + (i+1) + '顆</span><input type="number" id="raw-' + idx + '-' + i + '" value="" min="0" step="0.01" placeholder="kg" onchange="updateRawTotal(' + idx + ',' + unitPrice + ',true,' + pcCount + ')" style="width:70px"></div>';
          }
        } else {
          const kgVal = parseFloat(origQty) || '';
          inputsHtml = '<input type="number" id="raw-' + idx + '-0" value="' + kgVal + '" min="0" step="0.01" placeholder="公斤" onchange="updateRawTotal(' + idx + ',' + unitPrice + ',false,1)" style="width:90px"><span style="font-size:12px;color:var(--gray)">kg</span>';
        }
        bodyHtml = '<div class="raw-input-area"><label>' + (isPc ? '顆數模式：請填入每顆實際重量（公斤）' : '請確認實際重量（公斤）') + '</label><div class="raw-input-row">' + inputsHtml + '<span class="raw-calc" id="raw-calc-' + idx + '"></span></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><span style="font-size:11px;color:var(--gray)">小計</span><span class="item-subtotal" id="subtotal-' + idx + '" style="font-size:13px;font-weight:600">待確認</span></div>';
      } else {
        const qtyNum = parseFloat(origQty) || 1;
        const unit = origQty.replace(/[0-9.]/g,'').trim() || '包';

function updatePkgTotal(idx, unitPrice) {
  const qtyEl = document.getElementById('edit-qty-'+idx);
  const subtotalInputEl = document.getElementById('subtotal-input-'+idx);
  const subtotalEl = document.getElementById('subtotal-'+idx);
  const qty = parseFloat(qtyEl?.value) || 0;
  const subtotal = qty * unitPrice;
  if (subtotalInputEl) subtotalInputEl.value = subtotal;
  if (subtotalEl) subtotalEl.textContent = subtotal > 0 ? 'NT$'+subtotal.toLocaleString() : '待確認';
  updateAllTotals();
}

function updateRawTotal(idx, unitPrice, isPc, pcCount) {
  let totalKg = 0;
  if (isPc) {
    for (let i = 0; i < pcCount; i++) {
      totalKg += parseFloat(document.getElementById(`raw-${idx}-${i}`)?.value) || 0;
    }
  } else {
    totalKg = parseFloat(document.getElementById(`raw-${idx}-0`)?.value) || 0;
  }
  const subtotal = totalKg * unitPrice;
  const calcEl = document.getElementById(`raw-calc-${idx}`);
  const subtotalEl = document.getElementById(`subtotal-${idx}`);
  if (calcEl) calcEl.textContent = totalKg > 0 ? `${totalKg.toFixed(2)}kg × NT$${unitPrice} = NT$${subtotal.toLocaleString()}` : '';
  if (subtotalEl) subtotalEl.textContent = totalKg > 0 ? `NT$${subtotal.toLocaleString()}` : '待確認';
  updateAllTotals();
}

function updateAllTotals() {
  let total = 0;
  let hasUnconfirmed = false;
  currentItems.forEach((item, idx) => {
    if (item['類型'] === 'sample') return;
    if (item['類型'] === 'raw') {
      const subtotalEl = document.getElementById(`subtotal-${idx}`);
      if (subtotalEl && subtotalEl.textContent !== '待確認') {
        total += parseInt(subtotalEl.textContent.replace(/[^0-9]/g,'')) || 0;
      } else {
        hasUnconfirmed = true;
      }
    } else {
      total += Number(item['小計'] || 0);
    }
  });
  const el = document.getElementById('items-subtotal');
  const grandEl = document.getElementById('grand-total');
  if (el) el.textContent = hasUnconfirmed ? '含待確認項目' : `NT$${total.toLocaleString()}`;
  if (grandEl && !hasUnconfirmed) grandEl.textContent = `NT$${total.toLocaleString()}`;
}

function calculateTotal() {
  return currentItems.reduce((sum, item) => sum + Number(item['小計'] || 0), 0);
}

// ── SAVE ORDER ──
async function saveOrder() {
  const orderNo = currentOrder['訂單編號'];
  const status = document.getElementById('status-select').value;
  
  // 收集所有品項變更
  const updatedItems = [];
  currentItems.forEach((item, idx) => {
    if (item['類型'] === 'sample') return;
    if (item['類型'] === 'raw') {
      const isPc = item['數量／單位'] && item['數量／單位'].includes('顆');
      const pcCount = isPc ? (parseInt(item['數量／單位']) || 1) : 1;
      let totalKg = 0;
      for (let i = 0; i < pcCount; i++) {
        totalKg += parseFloat(document.getElementById(`raw-${idx}-${i}`)?.value) || 0;
      }
      if (totalKg > 0) {
        const subtotal = totalKg * Number(item['單價'] || 0);
        updatedItems.push({ name: item['品項名稱'], actualQty: totalKg+'kg', subtotal });
      }
    } else {
      const qtyEl = document.getElementById('edit-qty-'+idx);
      const subtotalInputEl = document.getElementById('subtotal-input-'+idx);
      const newQty = qtyEl ? qtyEl.value : null;
      const newSubtotal = subtotalInputEl ? Number(subtotalInputEl.value) : null;
      const origSubtotal = item['小計'] ? Number(item['小計']) : 0;
      if (newSubtotal !== null && newSubtotal !== origSubtotal) {
        updatedItems.push({ name: item['品項名稱'], actualQty: newQty ? newQty+'包' : item['數量／單位'], subtotal: newSubtotal });
      }
    }
  });

  // 計算新總金額
  let newTotal = 0;
  currentItems.forEach((item, idx) => {
    if (item['類型'] === 'sample') return;
    if (item['類型'] === 'raw') {
      const subtotalEl = document.getElementById(`subtotal-${idx}`);
      if (subtotalEl && subtotalEl.textContent !== '待確認') {
        newTotal += parseInt(subtotalEl.textContent.replace(/[^0-9]/g,'')) || 0;
      }
    } else {
      newTotal += Number(item['小計'] || 0);
    }
  });

  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateOrder', orderNo, status, items: updatedItems, total: newTotal || null })
    });
    const result = await res.json();
    if (result.success) {
      showToast('✅ 已儲存！');
      // 更新本地資料
      currentOrder['付款狀態'] = status;
      const orderInList = allOrders.find(o => o['訂單編號'] === orderNo);
      if (orderInList) orderInList['付款狀態'] = status;
      renderOrders();
    }
  } catch(e) {
    showToast('❌ 儲存失敗，請重試');
  }
}
