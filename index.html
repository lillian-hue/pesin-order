<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佩森肉舖 訂購單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1A0A00;
  --brown: #5C2D0A;
  --gold: #C8962E;
  --gold-light: #E8B84B;
  --cream: #FAF5EC;
  --cream-dark: #F0E8D8;
  --border: #D4B896;
  --gray: #8A7A6A;
  --green: #1A5C2A;
  --red: #8B1A1A;
  --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  color: var(--dark);
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, #1A0A00 0%, #3E1800 50%, #1A0A00 100%);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--gold);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-name { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
.brand-sub { font-size: 10px; color: rgba(200,150,46,0.6); letter-spacing: 2px; }
.header-badge { background: rgba(200,150,46,0.15); border: 1px solid var(--gold); border-radius: 4px; padding: 4px 12px; font-size: 11px; color: var(--gold); letter-spacing: 1px; }

/* ── LAYOUT ── */
.app-body { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 60px); }
@media(max-width:900px) { .app-body { grid-template-columns: 1fr; display: flex; flex-direction: column; } }

/* ── LEFT PANEL ── */
.left-panel { background: var(--cream); overflow-y: auto; max-height: calc(100vh - 60px); }
@media(max-width:900px) { .left-panel { max-height: none; overflow-y: visible; } }
.section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 12px; font-weight: 600; color: var(--brown);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* SALES SELECTOR */
.sales-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.sales-btn {
  padding: 10px 8px; border: 1.5px solid var(--border);
  border-radius: 6px; background: white; cursor: pointer;
  text-align: center; transition: all .2s;
}
.sales-btn:hover { border-color: var(--gold); }
.sales-btn.active { border-color: var(--brown); background: #FDF5E8; }
.sales-btn .code { font-size: 16px; font-weight: 700; color: var(--brown); font-family: 'Noto Serif TC', serif; }
.sales-btn .name { font-size: 10px; color: var(--gray); margin-top: 2px; }

/* FORM */
label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 3px; font-weight: 500; }
input, select, textarea {
  width: 100%; padding: 8px 10px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 6px;
  background: white; font-family: 'Noto Sans TC', sans-serif;
  color: var(--dark); outline: none; transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--gold); }
textarea { resize: vertical; min-height: 56px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row.full { grid-template-columns: 1fr; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }

/* CLIENT SELECTOR */
.client-select-wrap { position: relative; }
.client-loading { font-size: 11px; color: var(--gray); padding: 4px 0; }

/* PRODUCTS */
.product-search { margin-bottom: 10px; }
.cat-label {
  font-size: 10px; font-weight: 700; color: var(--gold);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 6px 0 4px; border-top: 1px solid var(--border);
  margin-top: 6px;
}
.product-list { max-height: 320px; overflow-y: auto; padding-right: 2px; }
.product-list::-webkit-scrollbar { width: 3px; }
.product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.product-item {
  display: grid; grid-template-columns: 18px 1fr auto auto;
  gap: 8px; align-items: start; padding: 7px 8px;
  border: 1px solid transparent; border-radius: 6px;
  cursor: pointer; transition: all .15s; margin-bottom: 3px;
}
.product-item:hover { border-color: var(--border); background: rgba(200,150,46,0.05); }
.product-item.selected { border-color: var(--brown); background: #FDF5E8; }
.product-item input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--brown); margin-top: 2px; cursor: pointer; }
.p-info .p-name { font-size: 12px; font-weight: 500; color: var(--dark); }
.p-info .p-spec { font-size: 10px; color: var(--gray); }
.p-price { font-size: 11px; color: var(--brown); font-weight: 500; white-space: nowrap; }
.p-qty-col { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
.p-qty-col input { width: 52px; padding: 3px 6px; font-size: 12px; text-align: center; }
.p-qty-col .disc-input { font-size: 10px; }
.qty-label { font-size: 9px; color: var(--gray); text-align: right; }

/* DISCOUNT & SHIPPING */
.option-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.option-btn {
  padding: 8px 6px; border: 1.5px solid var(--border);
  border-radius: 6px; background: white; cursor: pointer;
  text-align: center; font-size: 12px; color: var(--dark);
  transition: all .15s;
}
.option-btn:hover { border-color: var(--gold); }
.option-btn.active { border-color: var(--brown); background: #FDF5E8; color: var(--brown); font-weight: 500; }

/* BUTTONS */
.btn-preview {
  width: 100%; padding: 12px; background: var(--cream-dark);
  color: var(--brown); border: 1.5px solid var(--brown);
  border-radius: 8px; cursor: pointer; font-size: 14px;
  font-family: 'Noto Serif TC', serif; letter-spacing: 1px;
  margin-bottom: 8px; transition: all .2s;
}
.btn-preview:hover { background: var(--brown); color: var(--cream); }
.btn-submit {
  width: 100%; padding: 12px; background: var(--green);
  color: white; border: none; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-family: 'Noto Serif TC', serif;
  letter-spacing: 1px; margin-bottom: 8px; transition: background .2s;
}
.btn-submit:hover { background: #0F3A1A; }
.btn-submit:disabled { background: var(--gray); cursor: not-allowed; }
.btn-download {
  width: 100%; padding: 10px; background: var(--gold);
  color: var(--dark); border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  margin-bottom: 8px; font-weight: 500; transition: background .2s;
}
.btn-download:hover { background: var(--gold-light); }
.btn-new {
  width: 100%; padding: 10px; background: transparent;
  color: var(--gray); border: 1px dashed var(--border);
  border-radius: 8px; cursor: pointer; font-size: 13px;
  transition: all .2s;
}
.btn-new:hover { border-color: var(--brown); color: var(--brown); }
.submit-status { font-size: 12px; text-align: center; min-height: 18px; margin-bottom: 4px; }

/* ── RIGHT PANEL (PREVIEW) ── */
.right-panel {
  background: #E8E0D4;
  overflow-y: visible;
  padding: 12px;
  display: flex; flex-direction: column; align-items: center;
}
@media(max-width:900px) { .right-panel { max-height: none; padding: 10px; } }
.preview-label { font-size: 11px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

/* ORDER DOCUMENT */
#order-doc {
  background: white;
  width: 100%; max-width: 560px;
  padding: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  border-radius: 2px;
  font-size: 10px;
}
@media(max-width:900px) { #order-doc { padding: 12px; font-size: 9px; } }
.doc-header { display: grid; grid-template-columns: 1fr auto; align-items: flex-start; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid var(--brown); }
.doc-brand { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; color: var(--dark); letter-spacing: 2px; }
.doc-brand-en { font-size: 10px; color: var(--gray); letter-spacing: 3px; margin-top: 2px; }
.doc-title { font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 600; color: var(--brown); letter-spacing: 3px; text-align: right; }
.doc-no { font-size: 11px; color: var(--gray); text-align: right; margin-top: 4px; }

.doc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); font-size: 10px; }
.doc-meta-row { display: flex; gap: 6px; }
.doc-meta-key { color: var(--gray); white-space: nowrap; min-width: 70px; }
.doc-meta-val { font-weight: 500; color: var(--dark); }

table.doc-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 12px; }
.doc-table th { background: var(--brown); color: white; padding: 5px 6px; font-family: 'Noto Serif TC', serif; font-weight: 500; letter-spacing: 1px; text-align: center; font-size: 10px; }
.doc-table th:first-child { text-align: left; }
.doc-table td { padding: 4px 6px; border-bottom: 1px solid #EEE; font-size: 10px; }
.doc-table td.c { text-align: center; }
.doc-table td.r { text-align: right; }
.doc-table tr:nth-child(even) td { background: #FAFAFA; }
.doc-table .cat-row td { background: #F0E8D8 !important; font-weight: 600; color: var(--brown); font-size: 10px; letter-spacing: 1px; padding: 4px 8px; }

.doc-totals { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; padding: 8px 0; border-top: 1px solid var(--border); margin-bottom: 10px; font-size: 10px; }
.doc-total-row { display: flex; gap: 24px; color: var(--gray); }
.doc-total-row.final { font-size: 12px; font-weight: 700; color: var(--brown); font-family: 'Noto Serif TC', serif; padding-top: 4px; border-top: 1px solid var(--border); }

.doc-remark { background: #FDF5E8; border-left: 3px solid var(--brown); padding: 6px 10px; font-size: 10px; margin-bottom: 10px; border-radius: 0 4px 4px 0; }
.doc-bank { border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-size: 10px; }
.doc-bank-title { font-family: 'Noto Serif TC', serif; font-weight: 600; color: var(--brown); margin-bottom: 6px; letter-spacing: 1px; font-size: 12px; }
.doc-bank-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; }
.doc-bank-key { color: var(--gray); }
.doc-bank-val { font-weight: 500; }
.doc-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 9px; color: var(--gray); text-align: center; }
.empty-hint { color: var(--gray); text-align: center; padding: 40px 0; font-size: 13px; }

/* tag */
.tag-sample { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #FDF0E0; color: var(--gold); border: 1px solid var(--gold); margin-left: 4px; }
.tag-raw { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #EEF5EE; color: var(--green); border: 1px solid var(--green); margin-left: 4px; }
</style>
</head>

    </div>

    <!-- 商品選擇 -->

      <div class="section-title">商品選擇</div>
      <div class="product-search">

      <div class="product-list" id="product-list"></div>
    </div>

    <!-- 運費 -->

    <!-- 折扣 -->

    </div>

  </div>

    <div id="order-doc">
      <p class="empty-hint">填寫左側資料後點「更新預覽」</p>
    </div>
  </div>
</div>

// ── ORDER NO ──
function generateOrderNo() {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const key = `pesin_seq_${currentSales.code}_${today}`;
  const seq = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, seq);
  const short = today.slice(2); // 20260508 → 260508
  document.getElementById('f-no').value = `PS-${short}-${currentSales.code}${String(seq).padStart(3,'0')}`;
}

// ── LOAD CLIENTS FROM GOOGLE SHEETS CSV ──
async function loadClients() {
  try {
    const res = await fetch(CLIENT_WEBHOOK);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    clients = Array.isArray(data) ? data.filter(c => c['公司名稱']) : [];
    const sel = document.getElementById('f-client');
    clients.forEach((c, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = c['公司名稱'] || `客戶${i+1}`;
      sel.appendChild(opt);
    });
    document.getElementById('client-loading').textContent = 
      clients.length > 0 ? `✓ 已載入 ${clients.length} 位客戶` : '無客戶資料，請手動填寫';
  } catch(e) {
    console.error('客戶清單載入失敗:', e);
    document.getElementById('client-loading').textContent = '客戶清單載入失敗，請手動填寫';
  }
}

function fillClient() {
  const idx = document.getElementById('f-client').value;
  if (idx === '') return;
  const c = clients[parseInt(idx)];
  if (!c) return;
  document.getElementById('f-company').value = c['公司名稱'] || '';
  document.getElementById('f-contact').value = c['聯絡人'] || '';
  document.getElementById('f-phone').value = c['電話'] || '';
  document.getElementById('f-taxid').value = c['統編'] || '';
  document.getElementById('f-email').value = c['Email'] || '';
  document.getElementById('f-address').value = c['地址'] || '';
  const payment = c['付款方式'] || '';
  if (payment) {
    const sel = document.getElementById('f-payment');
    for (let opt of sel.options) {
      if (opt.value === payment) { sel.value = payment; break; }
    }
  }
}

function setRawMode(id, mode) {
  document.getElementById('rawmode-'+id).value = mode;
  const kgBtn = document.getElementById('mode-kg-'+id);
  const pcBtn = document.getElementById('mode-pc-'+id);
  const kgDiv = document.getElementById('raw-kg-'+id);

    pcBtn.style.background = 'white'; pcBtn.style.color = 'var(--gray)'; pcBtn.style.borderColor = 'var(--border)';
    kgDiv.style.display = 'block'; pcDiv.style.display = 'none';

    pcBtn.style.background = 'var(--brown)'; pcBtn.style.color = 'white'; pcBtn.style.borderColor = 'var(--brown)';
    kgBtn.style.background = 'white'; kgBtn.style.color = 'var(--gray)'; kgBtn.style.borderColor = 'var(--border)';
    pcDiv.style.display = 'block'; kgDiv.style.display = 'none';

function getSelected() {
  return PRODUCTS.filter(p => {
    const chk = document.getElementById('chk-'+p.id);
    return chk && chk.checked;
  }).map(p => {
    if (p.type === 'sample') {
      const qty = parseInt(document.getElementById('qty-'+p.id)?.value) || 1;
      return { ...p, qty, unitPrice: 0, itemDisc: 0, subtotal: 0, displayQty: qty+'包' };
    } else if (p.type === 'raw') {
      const modeEl = document.getElementById('rawmode-'+p.id);
      const mode = modeEl ? modeEl.value : 'kg';
      const itemDisc = parseFloat(document.getElementById('disc-'+p.id)?.value) || 0;
      const customPrice = parseFloat(document.getElementById('rawprice-'+p.id)?.value) || p.price || 0;
      const hasCut = document.getElementById('cut-chk-'+p.id)?.checked || false;
      const cutSpec = document.getElementById('cut-spec-'+p.id)?.value || '';
      if (mode === 'pc') {
        const pc = parseInt(document.getElementById('pc-'+p.id)?.value) || 1;
        const displayQtyPc = hasCut && cutSpec ? `${pc}顆（代切${cutSpec}cm）` : pc+'顆（重量待確認）';
        return { ...p, qty: pc, unitPrice: customPrice, itemDisc: 0, subtotal: 0, displayQty: displayQtyPc, rawMode: 'pc', rawPc: pc, hasCut, cutSpec, cutFee: 0 };
      } else {
        const qty = parseFloat(document.getElementById('qty-'+p.id)?.value) || 0;
        const cutRate = qty >= 60 ? 25 : 30;
        const cutFee = hasCut && qty > 0 ? Math.round(qty * cutRate) : 0;
        const manualAmt = parseFloat(document.getElementById('rawamt-'+p.id)?.value) || (qty * customPrice);
        const subtotal = Math.max(0, manualAmt - itemDisc + cutFee);
        const cutNote = hasCut && cutSpec ? `代切${cutSpec}cm，費率NT$${cutRate}/kg，代切費NT$${cutFee}` : '';
        const displayQtyFull = qty+'kg';
        return { ...p, qty, unitPrice: customPrice, itemDisc, subtotal, displayQty: displayQtyFull, rawMode: 'kg', hasCut, cutSpec, cutFee, cutRate: hasCut ? cutRate : 0, cutNote };
      }
    } else {
      const qty = parseInt(document.getElementById('qty-'+p.id)?.value) || 1;
      const unitPrice = p.price || 0;
      const itemDisc = parseFloat(document.getElementById('disc-'+p.id)?.value) || 0;
      const subtotal = Math.max(0, unitPrice * qty - itemDisc);
      return { ...p, qty, unitPrice, itemDisc, subtotal, displayQty: qty+'包' };
    }
  });
}

// ── LINE MESSAGE ──
function buildLineMsg(items, total, discPct, discAmt) {
  const date = document.getElementById('f-date').value;
  const no = document.getElementById('f-no').value;
  const company = document.getElementById('f-company').value;
  const contact = document.getElementById('f-contact').value;
  const remark = document.getElementById('f-remark').value;
  const hasSample = items.some(p => p.type === 'sample');
  const allSample = items.every(p => p.type === 'sample');

  let msg = `📦 新訂單通知\n`;
  msg += `----------------------\n`;
  msg += `👤 客戶：${company}`;
  if (contact) msg += ` 收件人：${contact}`;
  msg += `\n`;
  msg += `📋 單號：${no}\n`;
  msg += `📅 出貨：${date}\n`;
  if (remark) msg += `📝 備註：${remark}\n`;
  if (hasSample) msg += allSample ? `⚠️ 樣品，不收運費，不收款\n` : `⚠️ 含樣品（樣品不收費）\n`;
  msg += `----------------------\n訂購內容：\n`;
  items.filter(p=>p.type==='pkg').forEach(p => { msg += `▪ ${p.name} ${p.spec} x ${p.qty} 包\n`; });
  items.filter(p=>p.type==='raw').forEach(p => {
    msg += `▪ ${p.name} x ${p.qty}${p.rawMode==='pc'?'顆':'kg'}\n`;
    if (p.hasCut && p.cutSpec) msg += `   └ 代切 ${p.cutSpec}cm / NT$${p.cutRate||0}/kg / 代切費 NT$${(p.cutFee||0).toLocaleString()}\n`;
  });
  items.filter(p=>p.type==='sample').forEach(p => { msg += `▪ 【樣品】${p.name} ${p.spec} x ${p.qty} 包\n`; });
  msg += `----------------------\n`;
  const sv = currentShipping.val;
  if (sv === 'cod') msg += `🚚 運費：到付\n`;
  else if (sv === '290') msg += `🚚 運費：NT$290\n`;
  else msg += `🚚 運費：免運費\n`;
  if (!allSample) {
    if (discPct !== 100) msg += `折扣：${discPct}%\n`;
    if (discAmt > 0) msg += `折抵：NT$${discAmt.toLocaleString()}\n`;
    msg += `💰 總金額：NT$${total.toLocaleString()}\n`;
  }
  msg += `請確認後出貨，謝謝！`;
  return msg;
}

// ── SUBMIT ──
async function submitOrder() {
  const { selected, subtotalAll, total, discPct, discAmt } = updatePreview();
  if (!selected.length) { alert('請至少選擇一個商品'); return; }
  const company = document.getElementById('f-company').value;
  if (!company) { alert('請填寫公司名稱'); return; }

  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('submit-status');
  btn.disabled = true; btn.textContent = '送出中...';
  status.style.color = 'var(--gray)'; status.textContent = '傳送中...';

  const payload = {
    orderNo: document.getElementById('f-no').value,
    date: document.getElementById('f-date').value,
    company, taxid: document.getElementById('f-taxid').value,
    contact: document.getElementById('f-contact').value,
    address: document.getElementById('f-address').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    payment: document.getElementById('f-payment').value,
    sales: currentSales.name,
    salesCode: currentSales.code,
    salesEmail: currentSales.email,
    remark: document.getElementById('f-remark').value,
    shipping: currentShipping.label,
    discountPct: discPct,
    discountAmt: discAmt,
    subtotal: subtotalAll,
    total,
    items: selected.map(p => ({ id:p.id, name:p.name, spec:p.spec, type:p.type, qty:p.qty, displayQty:p.displayQty, unitPrice:p.unitPrice, itemDisc:p.itemDisc, subtotal:p.subtotal, cutNote:p.cutNote||'', hasCut:p.hasCut||false, cutSpec:p.cutSpec||'', cutFee:p.cutFee||0 })),
    lineMessage: (() => { try { return buildLineMsg(selected, total, discPct, discAmt); } catch(e) { return '新訂單通知（詳見系統）'; } })(),
  };

  try {
    const res = await fetch(WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (res.ok || res.status === 200) {
      btn.textContent = '✅ 送出成功！';
      status.style.color = 'green';
      status.textContent = `訂單 ${payload.orderNo} 已送出！`;
      setTimeout(() => { btn.disabled = false; btn.textContent = '📤 送出訂單'; }, 4000);
    } else throw new Error('HTTP '+res.status);
  } catch(e) {
    btn.disabled = false; btn.textContent = '📤 送出訂單';
    status.style.color = 'red'; status.textContent = '送出失敗，請檢查網路後重試';
  }
}

// ── DOWNLOAD ──
async function downloadImage() {
  const doc = document.getElementById('order-doc');
  if (doc.querySelector('.empty-hint')) { alert('請先更新預覽'); return; }
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(script);
  script.onload = async () => {
    const canvas = await html2canvas(doc, { scale:2, backgroundColor:'#ffffff', useCORS:true });
    const link = document.createElement('a');
    link.download = `佩森肉舖訂購單_${document.getElementById('f-no').value}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
}

// ── RAW CUT ──
function toggleCut(id) {
  const chk = document.getElementById('cut-chk-'+id);
  const area = document.getElementById('cut-area-'+id);
  area.style.display = chk.checked ? 'flex' : 'none';
  calcRawCut(id);
}

function calcRawCut(id) {
  const qty = parseFloat(document.getElementById('qty-'+id)?.value) || 0;
  const customPrice = parseFloat(document.getElementById('rawprice-'+id)?.value) || 0;
  const hasCut = document.getElementById('cut-chk-'+id)?.checked;
  const spec = document.getElementById('cut-spec-'+id)?.value || '';
  const feeEl = document.getElementById('cut-fee-'+id);

  if (hasCut && qty > 0) {
    const rate = qty >= 60 ? 25 : 30;
    const cutFee = Math.round(qty * rate);
    if (feeEl) feeEl.textContent = `代切費：${qty}kg × NT$${rate} = NT$${cutFee.toLocaleString()}`;
  } else {
    if (feeEl) feeEl.textContent = '';
  }
  updatePreview();
}

// ── NEW ORDER ──
function newOrder() {
  if (!confirm('確定要清空表單，開始新的訂單？')) return;
  document.getElementById('f-client').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-taxid').value = '';
  document.getElementById('f-contact').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-address').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-remark').value = '';
  document.getElementById('f-payment').value = '現結';
  document.getElementById('f-disc-pct').value = 100;
  document.getElementById('f-disc-amt').value = 0;
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('submit-status').textContent = '';
  // 取消勾選所有商品
  PRODUCTS.forEach(p => {
    const chk = document.getElementById('chk-'+p.id);
    const item = document.getElementById('pi-'+p.id);
    const wrap = document.getElementById('qty-wrap-'+p.id);
    if(chk) { chk.checked = false; item?.classList.remove('selected'); if(wrap) wrap.style.display='none'; }
  });
  // 重設運費
  document.querySelectorAll('.option-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  currentShipping = { val:'0', label:'免運費' };
  generateOrderNo();
  document.getElementById('order-doc').innerHTML = '<p class="empty-hint">填寫左側資料後點「更新預覽」</p>';
}

updatePreview();
